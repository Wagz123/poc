apiVersion: apps/v1
kind: Deployment
metadata:
  name: iscsi-pvc-test
  labels:
    app: iscsi-pvc-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iscsi-pvc-test
  template:
    metadata:
      labels:
        app: iscsi-pvc-test
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.25
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: iscsi-pvc-test
